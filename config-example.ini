[logs]
# Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
loglevel = INFO

[plex]
# Single server format (backward compatible):
# server = http://localhost:32400
# token = your_plex_token_here

# Multiple servers format (comma-separated or newline-separated):
# Format: server_url:token
# servers = http://localhost:32400:your_plex_token_here,http://plex2:32400:your_plex_token_here

[jellyfin]
# Single server format:
# server = http://localhost:8096
# token = your_jellyfin_api_token_here

# Multiple servers format (comma-separated or newline-separated):
# Format: server_url:token
# servers = http://localhost:8096:your_jellyfin_token_here,http://jellyfin2:8096:your_jellyfin_token_here

[emby]
# Single server format:
# server = http://localhost:8096
# token = your_emby_api_token_here

# Multiple servers format (comma-separated or newline-separated):
# Format: server_url:token
# servers = http://localhost:8096:your_emby_token_here,http://emby2:8096:your_emby_token_here

[scan]
directories = /path/to/your/media/folder

[behaviour]
scan_interval = 5
run_interval = 24
symlink_check = true
library_workers = 2
state_cache = true
state_db = rescan.db
repair_scan_cooldown_hours = 24
metadata_repair = false
cache_timeout_seconds = 60
cache_retry_wait_seconds = 60
# 0 = unlimited (keep retrying until Jellyfin/Emby responds or Rescan is stopped)
cache_retry_attempts = 0
# Per-page retry cap before skipping that page and continuing (0 = never skip)
cache_page_max_retries = 5
# Items per /Items API page — lower values reduce timeout risk on slow/rclone mounts
cache_page_size = 100
# Fetch MediaSources field — enables alternate path detection but can cause rclone timeouts
cache_fetch_media_sources = false
# Jellyfin/Emby batch scan settings (rclone-safe defaults)
# Increase batch_size and decrease batch_delay_seconds for faster local/NAS setups
batch_size = 25
batch_delay_seconds = 10

[notifications]
enabled = false
discord_webhook_url = your_discord_webhook_url_here
