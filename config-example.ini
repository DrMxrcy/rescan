[logs]
loglevel = INFO # DEBUG, INFO, WARNING, ERROR, CRITICAL

[plex]
# Single server format (backward compatible):
# server = http://localhost:32400
# token = your_plex_token_here

# Multiple servers format (comma-separated or newline-separated):
# Format: server_url:token
# servers = http://localhost:32400:your_plex_token_here,http://plex2:32400:your_plex_token_here

[jellyfin]
# Single server format:
# server = http://localhost:8096
# token = your_jellyfin_api_token_here

# Multiple servers format (comma-separated or newline-separated):
# Format: server_url:token
# servers = http://localhost:8096:your_jellyfin_token_here,http://jellyfin2:8096:your_jellyfin_token_here

[emby]
# Single server format:
# server = http://localhost:8096
# token = your_emby_api_token_here

# Multiple servers format (comma-separated or newline-separated):
# Format: server_url:token
# servers = http://localhost:8096:your_emby_token_here,http://emby2:8096:your_emby_token_here

[scan]
directories = /path/to/your/media/folder

[behaviour]
scan_interval = 5
run_interval = 24
symlink_check = true

[notifications]
enabled = false
discord_webhook_url = your_discord_webhook_url_here
